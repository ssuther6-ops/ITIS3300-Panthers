<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - Panthers Library</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="top-nav">
    <h1 class="nav-logo">Panthers Library</h1>
    <div class="nav-links">
      <a href="index.html" class="nav-link">Home</a>
      <a href="login.html" class="nav-link">Login</a>
      <a href="register.html" class="nav-link gold-btn">Register</a>
    </div>
  </header>

  <main class="center-content">
    <div class="auth-container">
      <h2>Join the Library</h2>

      <form onsubmit="registerUser(event)">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" placeholder="Enter your full name" required />
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="Enter your email" required />
        </div>

        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Choose a username" required />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Create a password" required />
        </div>

        <button type="submit">Create Account</button>
      </form>

      <p>Already a member? <a href="login.html">Login here</a></p>
      <p><a href="index.html" style="font-size: 0.8rem; opacity: 0.7;">← Back to Home</a></p>
    </div>
  </main>

  <script src="main.js"></script>
</body>
</html>
