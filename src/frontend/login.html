<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Panthers Library</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="top-nav">
    <h1 class="nav-logo">Panthers Library</h1>
    <div class="nav-links">
      <a href="index.html" class="nav-link">Home</a>
      <a href="login.html" class="nav-link">Login</a>
      <a href="register.html" class="nav-link gold-btn">Register</a>
    </div>
  </header>

  <main class="center-content">
    <div class="auth-container">
      <h2>Login</h2>

      <form onsubmit="loginUser(event)">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Enter your username" required />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" required />
        </div>

        <button type="submit">Enter Library</button>
      </form>

      <p>New member? <a href="register.html">Register here</a></p>
      <p><a href="index.html" style="font-size: 0.8rem; opacity: 0.7;">← Back to Home</a></p>
    </div>
  </main>

  <script src="main.js"></script>
</body>
</html>
