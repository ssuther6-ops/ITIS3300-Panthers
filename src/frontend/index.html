<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panthers Library - Catalog</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="top-nav">
        <h1 class="nav-logo">Panthers Library</h1>
        <nav>

            <a href="register.html" class="nav-link gold-btn">Register</a>
        </nav>

    <main class="center-content">

            <p id="statusText">Ready to browse the collection.</p>

    <script src="main.js"></script>
