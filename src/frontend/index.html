<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panthers Library - Catalog</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="top-nav">
    <h1 class="nav-logo">Panthers Library</h1>
    <div class="nav-links">
      <a href="index.html" class="nav-link">Home</a>
      <a href="login.html" class="nav-link">Login</a>
      <a href="register.html" class="nav-link gold-btn">Register</a>
      <a href="#" class="nav-link" onclick="logout()">Logout</a>
    </div>
  </header>

  <main class="center-content-column">
    <div class="auth-container search-box">
      <h2>Find a Book</h2>
      <div class="search-group">
        <input
          type="text"
          id="searchInput"
          placeholder="Search title, author, or ISBN..."
        />
        <button id="searchBtn" type="button">Search</button>
      </div>
      <p id="statusText">Search the Panther collection.</p>
    </div>

    <section class="featured-section">
      <h3 class="section-title">Available Books</h3>
      <div id="booksContainer" class="book-grid"></div>
    </section>

    <section class="featured-section" style="margin-top: 40px;">
      <div id="loansContainer" class="auth-container" style="max-width: 1000px; text-align: left;">
        <h2>My Loans</h2>
        <p>Login to see your active and returned books.</p>
      </div>
    </section>
  </main>

  <script src="main.js"></script>
</body>
</html>
